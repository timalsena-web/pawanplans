<!DOCTYPE html> 
<html lang="en"> 
<head> 
<meta charset="UTF-8"> 
<title>Login Register Slider</title> 
<link rel="stylesheet" 
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"> 
<style> 
*{ 
  box-sizing:border-box; 
  font-family:Segoe UI, Arial, sans-serif; 
} 
 
body{ 
  margin:0; 
  height:100vh; 
  display:flex; 
  justify-content:center; 
  align-items:center; 
  background:#0f1229; 
} 
 
/* CONTAINER */ 
.container{ 
  width:900px; 
  height:520px; 
  border-radius:20px; 
  position:relative; 
  overflow:hidden; 
  box-shadow:0 20px 50px rgba(0,0,0,.4); 
} 
 
/* FORM CONTAINERS */ 
.form-container{ 
  position:absolute; 
  top:0; 
  height:100%; 
  width:50%; 
  transition:0.6s ease; 
  display:flex; 
  justify-content:center; 
  align-items:center; 
} 
 
.login-container{ left:50%; z-index:2; } 
.register-container{ left:-50%; opacity:0; z-index:2; } 
 
.container.active .login-container{ 
  transform:translateX(-100%); 
  opacity:0; 
} 
 
.container.active .register-container{ 
  transform:translateX(100%); 
  opacity:1; 
  z-index:4; 
} 
 
/* INNER FORM BOX */ 
.form-box{ 
  width:85%; 
  height:90%; 
  padding:11px; 
  border-radius:20px; 
  background:linear-gradient(135deg,#1a1f71,#4c2a8c,#6b4fbc); 
  color:#fff; 
  display:flex; 
  flex-direction:column; 
  justify-content:center; 
} 
 
h2{ margin-bottom:15px; } 
 
/* INPUTS */ 
input{ 
  padding:11px; 
  margin:6px 0; 
  border:1px solid rgba(255,255,255,0.6); 
  border-radius:8px; 
  background:rgba(0,0,0,0.25); 
  color:#fff; 
  font-size:14px; 
  outline:none; 
  transition:all 0.25s ease; 
} 
 
input::placeholder{ 
  color:rgba(255,255,255,0.75); 
} 
 
input:focus{ 
  border-color:#ffffff; 
  background:rgba(0,0,0,0.25); 
  box-shadow:0 0 0 2px rgba(255,255,255,0.15); 
} 
 
/* AUTOFILL FIX */ 
input:-webkit-autofill, 
input:-webkit-autofill:hover, 
input:-webkit-autofill:focus{ 
  -webkit-text-fill-color:#ffffff; 
  -webkit-box-shadow:0 0 0 1000px rgba(0,0,0,0.35) inset; 
} 
 
/* BUTTON */ 
button.main{ 
  margin-top:16px; 
  padding:12px; 
  border:none; 
  border-radius:25px; 
  background:#ffffff; 
  color:#4c2a8c; 
  font-weight:600; 
  cursor:pointer; 
} 
 
/* TEXT */ 
.small{ 
  font-size:12px; 
  color:#ddd; 
  text-align:center; 
  margin:10px 0 6px; 
} 
 
/* SOCIAL */ 
.social{ 
  display:flex; 
  justify-content:center; 
  gap:14px; 
} 
 
.social-btn{ 
  width:44px; 
  height:44px; 
  border:1px solid rgba(255,255,255,.6); 
  border-radius:8px; 
  display:flex; 
  align-items:center; 
  justify-content:center; 
  cursor:pointer; 
  font-size:20px; 
} 
 
/* OVERLAY */ 
.overlay-container{ 
  position:absolute; 
  top:0; 
  left:0; 
  width:50%; 
  height:100%; 
  overflow:hidden; 
  transition:0.6s ease; 
  z-index:2; 
} 
 
.container.active .overlay-container{ 
  transform:translateX(100%); 
} 
 
.overlay{ 
  background:linear-gradient(135deg,#00c6d7,#007c91); 
  color:#fff; 
  position:absolute; 
  left:0; 
  width:200%; 
  height:100%; 
  border-radius:0 200px 200px 0; 
  display:flex; 
  transition:0.6s ease; 
} 
 
.container.active .overlay{ 
  transform:translateX(-50%); 
  border-radius:200px 0 0 200px; 
} 
 
.overlay-panel{ 
  width:50%; 
  display:flex; 
  flex-direction:column; 
  justify-content:center; 
  align-items:center; 
  text-align:center; 
  padding:40px; 
} 
 
.overlay button{ 
  margin-top:20px; 
  padding:10px 30px; 
  border-radius:25px; 
  border:2px solid #fff; 
  background:transparent; 
  color:#fff; 
  cursor:pointer; 
} 
 
/* Password toggle */ 
.password-wrapper { 
  position: relative; 
  display: flex; 
  align-items: center; 
} 
 
.password-wrapper input { 
  flex: 1; 
  padding-right: 40px; 
} 
 
.toggle-password { 
  position: absolute; 
  right: 10px; 
  top: 50%; 
  transform: translateY(-50%); 
  cursor: pointer; 
  color: #fff; 
  font-size: 16px; 
  opacity: 0.7; 
  transition: opacity 0.2s; 
} 
 
.toggle-password:hover { 
  opacity: 1; 
} 
</style> 
</head> 
 
<body> 
 
<div class="container" id="container"> 
 
  <!-- REGISTER --> 
  <div class="form-container register-container"> 
    <form class="form-box" id="registerForm"> 
      <h2>Registration</h2> 
 
      <input name="fullname" placeholder="Full Name" required> 
      <input name="username" placeholder="Username" required> 
      <input name="email" type="email" placeholder="Email" required> 
      <input name="phone" placeholder="Phone Number" required> 
 
      <div class="password-wrapper"> 
        <input name="password" type="password" placeholder="Password" required> 
        <span class="toggle-password"><i class="fas fa-eye"></i></span> 
      </div> 
 
      <div class="password-wrapper"> 
        <input name="repassword" type="password" placeholder="Re-type Password" required> 
        <span class="toggle-password"><i class="fas fa-eye"></i></span> 
      </div> 
 
      <button class="main" type="submit">Register</button> 
 
      <div class="small">or register with</div> 
      <div class="social"> 
        <div class="social-btn"><i class="fab fa-google"></i></div> 
        <div class="social-btn"><i class="fab fa-facebook-f"></i></div> 
      </div> 
    </form> 
  </div> 
 
  <!-- LOGIN --> 
  <div class="form-container login-container"> 
    <form class="form-box" id="loginForm"> 
      <h2>Login</h2> 
 
      <input name="username" placeholder="Username" required> 
 
      <div class="password-wrapper"> 
        <input name="password" type="password" placeholder="Password" required> 
        <span class="toggle-password"><i class="fas fa-eye"></i></span> 
      </div> 
 
      <div class="small">Forgot password?</div> 
      <button class="main" type="submit">Login</button> 
 
      <div class="small">or login with</div> 
      <div class="social"> 
        <div class="social-btn"><i class="fab fa-google"></i></div> 
        <div class="social-btn"><i class="fab fa-facebook-f"></i></div> 
      </div> 
    </form> 
  </div> 
 
  <!-- OVERLAY --> 
  <div class="overlay-container"> 
    <div class="overlay"> 
 
      <div class="overlay-panel"> 
        <h1>Hello, Welcome</h1> 
        <p>Don’t have an account?</p> 
        <button id="showRegister">Register</button> 
      </div> 
 
      <div class="overlay-panel"> 
        <h1>Welcome Back!</h1> 
        <p>Already have an account?</p> 
        <button id="showLogin">Login</button> 
      </div> 
 
    </div> 
  </div> 
 
</div> 
 
<script> 
const container = document.getElementById("container"); 
const showRegister = document.getElementById("showRegister"); 
const showLogin = document.getElementById("showLogin"); 
 
const registerForm = document.getElementById("registerForm"); 
const loginForm = document.getElementById("loginForm"); 
 
// Toggle login/register 
showRegister.onclick = () => container.classList.add("active"); 
showLogin.onclick = () => container.classList.remove("active"); 
 
// Registration submit 
registerForm.onsubmit = (e) => { 
  e.preventDefault(); 
  if(registerForm.password.value !== registerForm.repassword.value){ 
    alert("Passwords do not match"); 
    return; 
  } 
  alert("Registration successful (demo)"); 
}; 
 
// Login submit 
loginForm.onsubmit = (e) => { 
  e.preventDefault(); 
  alert("Login successful (demo)"); 
}; 
 
// Show/hide password 
document.querySelectorAll('.toggle-password').forEach(toggle => { 
  toggle.addEventListener('click', () => { 
    const input = toggle.previousElementSibling; 
    if (input.type === "password") { 
      input.type = "text"; 
      toggle.innerHTML = '<i class="fas fa-eye-slash"></i>'; 
    } else { 
      input.type = "password"; 
      toggle.innerHTML = '<i class="fas fa-eye"></i>'; 
    } 
  }); 
}); 
</script> 
 
</body> 
</html>
